<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesion | PETPAW</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-left">
      <h1 class="auth-title">Bienvenido de nuevo</h1>
      <p class="auth-subtitle">Ingresa tus credenciales</p>

      <form id="login-form" class="auth-form" action="#" method="post" novalidate>
        <div>
          <label class="form-label" for="login-email">Correo electronico</label>
          <input class="form-input" id="login-email" type="email" placeholder="email@gmail.com" autocomplete="email" required />
        </div>

        <div>
          <label class="form-label" for="login-password">Contrasena</label>
          <div class="input-wrap">
            <input id="login-password" type="password" placeholder="Ingresa tu contrasena" autocomplete="current-password" required />
            <i class="bi bi-eye password-eye" data-password-toggle aria-label="Mostrar u ocultar contrasena"></i>
          </div>
        </div>

        <button class="auth-submit" type="submit">Iniciar sesion</button>
        <p id="login-message" class="auth-message is-hidden" role="alert" aria-live="polite"></p>
      </form>

      <div class="auth-divider">o</div>

      <div class="social-row">
        <button class="social-btn" type="button"><span class="google-icon">G</span> Sign in with Google</button>
        <button class="social-btn" type="button"><i class="bi bi-apple"></i> Sign in with Apple</button>
      </div>

      <p class="auth-hint">No tienes una cuenta? <a href="signup.html">Registrarse</a></p>
    </section>

    <section class="auth-right auth-right-login">
      <h2 class="auth-brand">PETPAW</h2>
      <p class="auth-overlay-title">Animate a aumentar tu familia</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth-shared.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
